<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Register — Turtle Bakes</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐢</text></svg>" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">🐢 Turtle <span>Bakes</span></a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">← Home</a>
      <a href="cart.html" class="nav-cart" id="nav-cart">🛒<span id="cart-badge">0</span></a>
    </div>
  </nav>

  <!-- AUTH CARD -->
  <div class="auth-page">
    <div class="auth-card animate-in">
      <div class="auth-logo">
        <h2>🐢 Turtle Bakes</h2>
        <p>Login to track your orders &amp; more</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="login-pass" type="password" placeholder="Your password" required />
        </div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()" id="login-btn">
          Login
        </button>
        <div class="auth-divider">— or —</div>
        <a href="../index.html" class="btn btn-outline btn-full" style="text-align:center;">Browse Menu</a>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form" style="display:none;">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" id="reg-name" type="text" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">📱 Phone Number * <span style="font-weight:400;color:var(--text-light)">(10 digits)</span></label>
          <div style="display:flex;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--cream);">
            <span style="padding:0 12px;color:var(--text-mid);font-size:0.9rem;border-right:1.5px solid var(--border);display:flex;align-items:center;background:var(--cream-dark);white-space:nowrap;">🇮🇳 +91</span>
            <input class="form-input" id="reg-phone" type="tel" placeholder="9876543210" maxlength="10"
              style="border:none;border-radius:0;flex:1;"
              oninput="this.value=this.value.replace(/\D/g,'')" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password * <span style="font-weight:400;color:var(--text-light)">(min 6 chars)</span></label>
          <input class="form-input" id="reg-pass" type="password" placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password *</label>
          <input class="form-input" id="reg-pass2" type="password" placeholder="Confirm your password" required />
        </div>
        <button class="btn btn-primary btn-full" onclick="handleRegister()" id="register-btn">
          Create Account
        </button>
      </div>

      <!-- Logged-in state -->
      <div id="logged-in-view" style="display:none;text-align:center;">
        <div style="font-size:3rem;margin-bottom:12px;">👤</div>
        <h3 style="font-family:var(--font-display);color:var(--chocolate);margin-bottom:6px;" id="user-greeting">Welcome back!</h3>
        <p style="color:var(--text-light);margin-bottom:24px;" id="user-email-display"></p>
        <a href="../index.html" class="btn btn-primary btn-full" style="margin-bottom:12px;">Browse Menu</a>
        <button class="btn btn-outline btn-full" onclick="handleLogout()">Sign Out</button>
      </div>

      <div class="auth-footer">
        By continuing, you agree to our Terms &amp; Privacy Policy.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
