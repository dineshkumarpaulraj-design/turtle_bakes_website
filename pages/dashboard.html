<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders | Turtle Bakes</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐢</text></svg>" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">🐢 Turtle <span>Bakes</span></a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">← Home</a>
      <a href="cart.html" class="nav-cart" id="nav-cart">🛒<span id="cart-badge">0</span></a>
      <a href="auth.html" class="btn-login" id="auth-btn">Login</a>
    </div>
  </nav>
  <main class="tb-dashboard-page">
    <h1 class="tb-dashboard-title">My Orders 🧾</h1>
    <p class="tb-dashboard-subtitle">Track all your Turtle Bakes orders below.</p>
    <div class="tb-status-legend animate-in">
      <span class="tb-status-badge" style="color:#92400e;background:#fef3c7">⏳ Pending</span>
      <span class="tb-status-badge" style="color:#1e40af;background:#dbeafe">✅ Confirmed</span>
      <span class="tb-status-badge" style="color:#6d28d9;background:#ede9fe">👩‍🍳 Preparing</span>
      <span class="tb-status-badge" style="color:#065f46;background:#d1fae5">🚚 Out for Delivery</span>
      <span class="tb-status-badge" style="color:#14532d;background:#bbf7d0">🎉 Delivered</span>
    </div>
    <div id="tb-orders-list" style="margin-top:28px;">
      <div class="loader"><div class="spinner"></div><p>Loading orders...</p></div>
    </div>
  </main>
  <footer>
    <div class="footer-logo">🐢 Turtle Bakes</div>
    <p>Handcrafted with love · Virudhunagar, Tamil Nadu</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/features.js"></script>
</body>
</html>
